<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>livart 업무 자동화 허브</title>
<style>
:root{
  --blue:#1d4ed8;--blue-dark:#1e40af;--blue-light:#eff6ff;--blue-mid:#93c5fd;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;
  --gray-500:#64748b;--gray-700:#334155;--gray-900:#0f172a;
  --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--gray-100);color:var(--gray-900)}
header.hub-header{background:#fff;border-bottom:1px solid var(--gray-200);padding:36px 24px 30px;text-align:center}
.hub-title{font-size:24px;font-weight:800;color:var(--blue-dark);margin:0 0 8px}
.hub-sub{font-size:13.5px;color:var(--gray-500);margin:0}
main{max-width:1040px;margin:0 auto;padding:32px 20px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.card{position:relative;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:22px 20px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:10px;min-height:170px;transition:.15s;box-shadow:0 1px 2px #0000000a}
.card.ready:hover{border-color:var(--blue-mid);box-shadow:0 6px 18px #1d4ed81a;transform:translateY(-2px)}
.card.planned{opacity:.6;cursor:default}
.card-icon{width:44px;height:44px;border-radius:11px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:22px}
.card.planned .card-icon{background:var(--gray-100)}
.card-title{font-size:15px;font-weight:700;color:var(--gray-900)}
.card-desc{font-size:12.5px;color:var(--gray-500);line-height:1.5;flex:1}
.badge{position:absolute;top:18px;right:18px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge.ready{background:#dcfce7;color:#15803d}
.badge.planned{background:var(--gray-100);color:var(--gray-500)}
.card-arrow{font-size:12px;color:var(--blue);font-weight:600}
footer.hub-notice{text-align:center;color:var(--gray-500);font-size:11.5px;padding:0 0 30px}
</style>
</head>
<body>

<header class="hub-header">
  <h1 class="hub-title">livart 업무 자동화 허브</h1>
  <p class="hub-sub">필요한 도구를 선택해서 바로 사용하세요. 새 도구는 개발이 끝나는 대로 순차적으로 추가됩니다.</p>
</header>

<main>
  <div class="grid" id="appGrid"></div>
</main>

<footer class="hub-notice">🔒 각 도구는 독립적으로 동작하며, 문서/데이터 처리는 도구별 안내에 따릅니다.</footer>

<script>
/* 앱이 새로 생기면 이 배열에 한 줄 추가하면 됩니다.
   status: 'ready'(사용 가능) | 'planned'(준비중) */
const APPS = [
  {
    icon: '🔒',
    title: 'AI 업로드용 문서 보안 필터',
    desc: 'AI 서비스에 업로드하기 전, 문서 속 회사명·인명·금액 등 민감정보를 브라우저 안에서만 자동 탐지·가명화합니다.',
    url: 'apps/doc-security-filter.html',
    status: 'ready',
  },
  {
    icon: '📂',
    title: '폴더 트리 정리 도구',
    desc: 'PC 폴더를 스캔해 트리로 시각화하고, 드래그 이동·Del키 삭제로 구조를 편집한 뒤 실제 파일에 한 번에 적용합니다.',
    url: 'apps/folder-organizer.html',
    status: 'ready',
  },
  {
    icon: '📈',
    title: '매출·이익 대시보드',
    desc: 'ERP RAW 엑셀을 올리면 연도·월·조직·영업사원·고객사별 매출/이익/이익률을 다차원으로 조회합니다.',
    url: 'apps/sales-dashboard.html',
    status: 'ready',
  },
  {
    icon: '📊',
    title: '보고서 생성기',
    desc: '데이터를 입력하면 정해진 양식의 보고서를 자동으로 만들어줍니다.',
    url: '',
    status: 'planned',
  },
  {
    icon: '🏭',
    title: '생산모니터링',
    desc: '생산 현황을 한눈에 모니터링하고 시각화합니다.',
    url: '',
    status: 'planned',
  },
  {
    icon: '🗞️',
    title: '카드뉴스 제작기',
    desc: '콘텐츠를 카드뉴스 형태로 손쉽게 제작합니다.',
    url: '',
    status: 'planned',
  },
];

const grid = document.getElementById('appGrid');
APPS.forEach(app => {
  const isReady = app.status === 'ready';
  const el = document.createElement(isReady ? 'a' : 'div');
  el.className = 'card ' + (isReady ? 'ready' : 'planned');
  if (isReady) el.href = app.url;
  el.innerHTML = `
    <span class="badge ${isReady ? 'ready' : 'planned'}">${isReady ? '사용 가능' : '준비중'}</span>
    <div class="card-icon">${app.icon}</div>
    <div class="card-title">${app.title}</div>
    <div class="card-desc">${app.desc}</div>
    ${isReady ? '<div class="card-arrow">바로가기 →</div>' : ''}
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
